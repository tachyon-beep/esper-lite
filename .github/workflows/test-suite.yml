name: Test Suite

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # Nightly at 2 AM UTC

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Enforce leyline type boundaries
        run: python scripts/lint_leyline_types.py

      - name: Enforce defensive patterns whitelist
        run: python scripts/lint_defensive_patterns.py

      - name: Enforce GPU sync whitelist
        run: python scripts/lint_gpu_sync.py

      # Use pre-built ruff action - no installation needed
      - name: Lint with ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: "check src/ tests/"

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra tui --group dev

      - name: Type check with mypy
        run: MYPYPATH=src uv run mypy -p esper

  property-tests:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run property tests
        env:
          HYPOTHESIS_PROFILE: ci
          PYTHONPATH: src
        run: |
          uv run pytest -m property \
            -v -x \
            --hypothesis-show-statistics \
            --tb=short

  unit-and-integration-tests:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: |
          uv run pytest -m "not integration and not stress and not property and not slow" -x --cov=src --cov-report=json:.coverage-reports/coverage.json

      # Coverage threshold: 75% (not 80%) because this job excludes integration,
      # stress, property, and slow tests which exercise additional code paths.
      # Full coverage with all test types locally shows ~81%.
      - name: Check coverage threshold
        run: |
          python3 -c "
          import json, sys
          data = json.load(open('.coverage-reports/coverage.json'))
          coverage = data['totals']['percent_covered']
          print(f'Coverage: {coverage:.1f}%')
          if coverage < 75:
              print(f'Coverage {coverage:.1f}% below 75% threshold')
              sys.exit(1)
          "

      - name: Run integration tests
        env:
          PYTHONPATH: src
        run: |
          uv run pytest -m integration -v -x

  overwatch-web-tests:
    runs-on: ubuntu-latest
    needs: [property-tests, unit-and-integration-tests]
    timeout-minutes: 20
    defaults:
      run:
        working-directory: src/esper/karn/overwatch/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/esper/karn/overwatch/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build dashboard
        run: npm run build

      - name: Run component tests
        run: npm test -- --run

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke tests
        run: |
          npm run test:e2e -- --project=chromium

  nightly-full-suite:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run full property tests (thorough)
        env:
          HYPOTHESIS_PROFILE: thorough
          PYTHONPATH: src
        run: |
          uv run pytest -m property -v --hypothesis-show-statistics

      - name: Run slow tests
        env:
          PYTHONPATH: src
        run: |
          uv run pytest -m "slow and not integration and not stress and not property" -v

      - name: Run stress tests
        env:
          PYTHONPATH: src
        run: |
          uv run pytest -m stress -v
