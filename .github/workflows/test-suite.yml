name: Test Suite

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # Nightly at 2 AM UTC

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Enforce leyline type boundaries
        run: python scripts/lint_leyline_types.py

      - name: Enforce defensive patterns whitelist
        run: python scripts/lint_defensive_patterns.py

      - name: Enforce GPU sync whitelist
        run: python scripts/lint_gpu_sync.py

      # Use pre-built ruff action - no installation needed
      - name: Lint with ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: "check src/ tests/"

  weft-shadow:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install project dependencies
        run: uv sync --group dev

      - name: Install Weft CLI tools
        run: |
          uv tool install wardline==1.0.1
          uv tool install loomweave==1.1.0
          uv tool install loomweave-plugin-python==1.1.0rc5
          uv tool install legis==1.0.0
          uv tool install warpline==1.0.0

      - name: Prepare Weft artifact directory
        run: mkdir -p "$RUNNER_TEMP/weft-shadow"

      - name: Run Wardline shadow scan
        continue-on-error: true
        run: |
          wardline doctor --root . > "$RUNNER_TEMP/weft-shadow/wardline-doctor.txt"
          wardline scan . \
            --config weft.toml \
            --local-only \
            --format jsonl \
            --fail-on error \
            --fail-on-unanalyzed \
            --output "$RUNNER_TEMP/weft-shadow/wardline.jsonl"

      - name: Refresh Loomweave index
        continue-on-error: true
        run: |
          loomweave install --path . \
            > "$RUNNER_TEMP/weft-shadow/loomweave-install.txt"
          loomweave analyze . --config loomweave.yaml --no-incremental --json \
            > "$RUNNER_TEMP/weft-shadow/loomweave-analyze.txt"
          loomweave doctor --path . --format json \
            > "$RUNNER_TEMP/weft-shadow/loomweave-doctor.json"

      - name: Capture Legis and Warpline readiness
        continue-on-error: true
        run: |
          legis doctor --format json > "$RUNNER_TEMP/weft-shadow/legis-doctor.json"
          warpline install --repo . --config --json \
            > "$RUNNER_TEMP/weft-shadow/warpline-install.json"
          warpline doctor --repo . --json > "$RUNNER_TEMP/weft-shadow/warpline-doctor.json"

      - name: Build Weft parity report
        run: |
          uv run python scripts/ci_weft_parity.py \
            --output "$RUNNER_TEMP/weft-shadow/parity.json" \
            --artifacts-dir "$RUNNER_TEMP/weft-shadow" \
            --wardline-output "$RUNNER_TEMP/weft-shadow/wardline.jsonl"

      - name: Upload Weft shadow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weft-shadow-${{ github.sha }}
          path: ${{ runner.temp }}/weft-shadow/**

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra tui --extra dashboard --group dev

      - name: Type check with mypy
        run: MYPYPATH=src uv run mypy -p esper

  property-tests:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run property tests
        env:
          HYPOTHESIS_PROFILE: ci
          PYTHONPATH: src
        run: |
          uv run pytest -m property \
            -v -x \
            --hypothesis-show-statistics \
            --tb=short

  unit-and-integration-tests:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: |
          uv run pytest -m "not integration and not stress and not property and not slow" -x --cov=src --cov-report=json:.coverage-reports/coverage.json

      # Coverage threshold: 75% (not 80%) because this job excludes integration,
      # stress, property, and slow tests which exercise additional code paths.
      # Full coverage with all test types locally shows ~81%.
      - name: Check coverage threshold
        run: |
          python3 -c "
          import json, sys
          data = json.load(open('.coverage-reports/coverage.json'))
          coverage = data['totals']['percent_covered']
          print(f'Coverage: {coverage:.1f}%')
          if coverage < 75:
              print(f'Coverage {coverage:.1f}% below 75% threshold')
              sys.exit(1)
          "

      - name: Run integration tests
        env:
          PYTHONPATH: src
        run: |
          uv run pytest -m integration -v -x

  overwatch-web-tests:
    runs-on: ubuntu-latest
    needs: [property-tests, unit-and-integration-tests]
    timeout-minutes: 20
    defaults:
      run:
        working-directory: src/esper/karn/overwatch/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/esper/karn/overwatch/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build dashboard
        run: npm run build

      - name: Run component tests
        run: npm test -- --run

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke tests
        run: |
          npm run test:e2e -- --project=chromium

  nightly-full-suite:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run full property tests (thorough)
        env:
          HYPOTHESIS_PROFILE: thorough
          PYTHONPATH: src
        run: |
          uv run pytest -m property -v --hypothesis-show-statistics

      - name: Run slow tests
        env:
          PYTHONPATH: src
        run: |
          uv run pytest -m "slow and not integration and not stress and not property" -v

      - name: Run stress tests
        env:
          PYTHONPATH: src
        run: |
          uv run pytest -m stress -v
