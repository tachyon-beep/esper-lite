integrations:
  filigree:
    actor: loomweave-mcp
    base_url: http://127.0.0.1:9189
    enabled: true
    timeout_seconds: 5
    token_env: WEFT_FEDERATION_TOKEN
llm_policy:
  allow_live_provider: true
  cache_max_age_days: 180
  claude_cli:
    exclude_dynamic_system_prompt_sections: true
    executable: claude
    max_turns: 2
    model: default
    no_session_persistence: true
    permission_mode: plan
    timeout_seconds: 300
    tools: []
  codex_cli:
    executable: codex
    model: default
    profile: null
    sandbox: read-only
    timeout_seconds: 300
  enabled: true
  max_inferred_edges_per_caller: 8
  model_id: codex-cli-default
  openrouter:
    api_key_env: OPENROUTER_API_KEY
    attribution:
      referer: https://github.com/foundryside-dev/loomweave
      title: Loomweave
    endpoint_url: https://openrouter.ai/api/v1
  provider: codex_cli
  session_token_ceiling: 1000000
serve:
  http:
    enabled: true
    wardline_taint_write: true
  mcp:
    enable_write_tools: true
version: 1
semantic_search:
  enabled: true
  provider: local_openai
  allow_live_provider: false
  model_id: bge-small-en-v1.5
  dimensions: 384
  endpoint_url: http://127.0.0.1:8770
